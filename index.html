        img {

            height: auto;
            border-radius: 8px;

        }

            h1, h2 {

            }

            .move marquee {
                font-size: 1rem;
            }

            .server-images {

                align-items: center;
            }
        }

        ::-webkit-scrollbar {

        }

        ::-webkit-scrollbar-thumb {
            background-color: #555;

        }
